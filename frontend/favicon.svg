<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Matte Black Premium Textured Circular Base -->
  <circle cx="32" cy="32" r="32" fill="#121215" />
  
  <!-- Outer Minimalist Ring Accent -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#222226" stroke-width="1.5" />
  
  <g transform="translate(16, 16)">
    <!-- Main Aggressive Diagonal Slash (Top Left to Bottom Right) -->
    <path d="M 4 0 L 32 28" stroke="#ffffff" stroke-width="5" stroke-linecap="square" />
    
    <!-- Intersecting Diagonal Slash (Top Right to Bottom Left) with a clean center gap -->
    <path d="M 28 0 L 20 8" stroke="#ffffff" stroke-width="5" stroke-linecap="square" />
    <path d="M 12 16 L 4 24" stroke="#ffffff" stroke-width="5" stroke-linecap="square" />
    
    <!-- Base Core Balance Line (Calisthenics Anchor Indicator) -->
    <line x1="0" y1="30" x2="32" y2="30" stroke="#44444a" stroke-width="2.5" />
  </g>
</svg>
